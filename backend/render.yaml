services:
  - type: web
    name: gunаplus-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://newspaper-gnp.vercel.app
      - key: DATABASE_URL
        sync: false   # set this in Render dashboard to your Neon/Supabase PostgreSQL URL
